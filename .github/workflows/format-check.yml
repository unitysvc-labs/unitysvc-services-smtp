name: Format Check

# Thin caller — logic lives in the shared reusable workflow so a fix lands
# once for all unitysvc-services-* repos. See unitysvc-labs/.github.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  format-check:
    uses: unitysvc-labs/.github/.github/workflows/seller-format-check.yml@main
