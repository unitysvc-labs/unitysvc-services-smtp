name: Upload Data to Staging

# Thin caller — logic lives in the shared reusable workflow so a fix lands
# once for all unitysvc-services-* repos. See unitysvc-labs/.github.

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  upload:
    # Only run if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    permissions:
      contents: write  # needed to push override files back to main
    uses: unitysvc-labs/.github/.github/workflows/seller-upload-staging.yml@main
    secrets: inherit
