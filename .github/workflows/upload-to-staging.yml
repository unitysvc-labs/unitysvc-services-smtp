name: Upload Data to Staging

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  upload:
    # Only run if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push override files back to main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install unitysvc-sellers
        run: |
          python -m pip install --upgrade pip
          pip install unitysvc-sellers

      - name: Seed seller-secrets store
        env:
          UNITYSVC_SELLER_API_KEY: ${{ secrets.UNITYSVC_SELLER_STAGING_API_KEY }}
          UNITYSVC_SELLER_API_URL: ${{ secrets.UNITYSVC_SELLER_STAGING_API_URL }}
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          # Auto-derive the seller-secret names this repo needs from its data
          # files: every ${ customer_secrets.X } and ${ secrets.X } reference
          # in any offering.json / listing.json. Templated forms like
          # ${ customer_secrets.{{ params.X }} } are NOT matched directly —
          # they're covered transitively when the per-service user_parameters_schema
          # defaults the param to the literal name used by the non-plus variant.
          names="$(grep -rEhno \
            '\$\{\s*(customer_secrets|secrets)\.[A-Za-z_][A-Za-z0-9_]*' \
            data/ \
            | sed -E 's/.*(customer_secrets|secrets)\.([A-Za-z_][A-Za-z0-9_]*).*/\2/' \
            | sort -u)"
          if [ -z "$names" ]; then
            echo "No secret references found under data/."
            exit 0
          fi
          echo "Found secret references:"
          printf '  - %s\n' $names
          seeded=0
          missing=0
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            value="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r --arg n "$name" '.[$n] // empty')"
            if [ -z "$value" ]; then
              echo "::warning::Secret '$name' referenced under data/ has no value in GitHub secrets; skipping."
              missing=$((missing+1))
              continue
            fi
            echo "::add-mask::$value"
            printf '%s' "$value" | usvc_seller secrets set "$name"
            seeded=$((seeded+1))
          done <<< "$names"
          echo "Seeded $seeded secret(s); $missing missing."

      - name: Upload services
        env:
          UNITYSVC_SELLER_API_KEY: ${{ secrets.UNITYSVC_SELLER_STAGING_API_KEY }}
          UNITYSVC_SELLER_API_URL: ${{ secrets.UNITYSVC_SELLER_STAGING_API_URL }}
        run: |
          echo "Uploading services to staging..."
          usvc_seller data upload

      - name: Commit back override files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find data \( -name "*.override.json" -o -name "*.override.toml" \) -exec git add {} +
          if ! git diff --cached --quiet; then
            git commit -m "ci: write back service_id override files [skip ci]"
            git push
          else
            echo "No override files changed"
          fi

      - name: Publish services
        env:
          UNITYSVC_SELLER_API_KEY: ${{ secrets.UNITYSVC_SELLER_STAGING_API_KEY }}
          UNITYSVC_SELLER_API_URL: ${{ secrets.UNITYSVC_SELLER_STAGING_API_URL }}
        run: |
          echo "Publishing services to make them visible in the catalog..."
          usvc_seller services set-visibility public --local-ids --data-dir data --yes

      - name: Submit services for review
        env:
          UNITYSVC_SELLER_API_KEY: ${{ secrets.UNITYSVC_SELLER_STAGING_API_KEY }}
          UNITYSVC_SELLER_API_URL: ${{ secrets.UNITYSVC_SELLER_STAGING_API_URL }}
        run: |
          echo "Submitting services for review..."
          usvc_seller services submit --local-ids --data-dir data --yes

      - name: Upload summary
        if: always()
        run: |
          echo "## Upload Summary (Staging)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded to Backend" >> $GITHUB_STEP_SUMMARY
          echo "- Backend URL: \`${{ secrets.UNITYSVC_SELLER_STAGING_API_URL }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
